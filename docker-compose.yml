services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: varyacode_php
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - database
    environment:
      DATABASE_URL: "mysql://varyacode:varyacode@database:3306/varyacode?serverVersion=11.4.0-MariaDB"
      MAILER_DSN: "smtp://mailpit:1025"
    networks:
      - varyacode

  nginx:
    image: nginx:alpine
    container_name: varyacode_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - varyacode

  database:
    image: mariadb:11.4
    container_name: varyacode_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: varyacode
      MYSQL_USER: varyacode
      MYSQL_PASSWORD: varyacode
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - varyacode

  mailpit:
    image: axllent/mailpit
    container_name: varyacode_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - varyacode

volumes:
  db_data:

networks:
  varyacode:
    driver: bridge
